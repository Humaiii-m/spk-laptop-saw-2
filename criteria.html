<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPK Laptop SAW</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        success: '#10b981',
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- jsPDF & AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <!-- SheetJS -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-300 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex-shrink-0 flex flex-col transition-colors duration-300 hidden md:flex z-20" id="sidebar">
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-700">
            <i class="ph-fill ph-laptop text-primary text-2xl mr-2"></i>
            <span class="text-xl font-bold tracking-wide">SPK<span class="text-primary">Laptop</span></span>
        </div>
        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <a href="index.html" class="nav-link active flex items-center px-3 py-2.5 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" data-target="dashboard-section">
                <i class="ph ph-squares-four text-xl mr-3"></i> Dashboard
            </a>
            <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-4 mb-2 px-3">Data Master</div>
            <a href="criteria.html" class="nav-link flex items-center px-3 py-2.5 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" data-target="criteria-section">
                <i class="ph ph-list-numbers text-xl mr-3"></i> Data Kriteria
            </a>
            <a href="alternatives.html" class="nav-link flex items-center px-3 py-2.5 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" data-target="alternatives-section">
                <i class="ph ph-devices text-xl mr-3"></i> Data Alternatif
            </a>
            <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-4 mb-2 px-3">Proses SPK</div>
            <a href="calculation.html" class="nav-link flex items-center px-3 py-2.5 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" data-target="calculation-section">
                <i class="ph ph-calculator text-xl mr-3"></i> Perhitungan SAW
            </a>
            <a href="ranking.html" class="nav-link flex items-center px-3 py-2.5 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" data-target="ranking-section">
                <i class="ph ph-trophy text-xl mr-3"></i> Hasil Ranking
            </a>
        </nav>
    </aside>

    <!-- Mobile Sidebar Overlay -->
    <div id="mobile-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-10 hidden md:hidden"></div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-4 sm:px-6 z-10 transition-colors duration-300">
            <div class="flex items-center">
                <button id="sidebar-toggle" class="md:hidden text-gray-500 hover:text-primary focus:outline-none p-2 rounded-md">
                    <i class="ph ph-list text-2xl"></i>
                </button>
                <h1 id="page-title" class="text-lg font-semibold ml-2 md:ml-0">Dashboard</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button id="dark-mode-toggle" class="p-2 rounded-full text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors focus:outline-none">
                    <i class="ph ph-moon text-xl dark:hidden"></i>
                    <i class="ph ph-sun text-xl hidden dark:block"></i>
                </button>
                <div class="h-8 w-8 rounded-full bg-gradient-to-tr from-primary to-blue-300 flex items-center justify-center text-white font-bold shadow-md">
                    A
                </div>
            </div>
        </header>

        <!-- Main Scrollable Area -->
        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 dark:bg-gray-900 p-4 sm:p-6 transition-colors duration-300 relative" id="main-content">
            <section id="criteria-section" class="page-section fade-in">
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
                    <div class="p-4 sm:p-6 border-b border-gray-100 dark:border-gray-700 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <div>
                            <h2 class="text-xl font-semibold">Manajemen Kriteria</h2>
                            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Kelola data kriteria untuk perhitungan SAW. Total bobot harus 100.</p>
                        </div>
                        <button onclick="openCriteriaModal()" class="bg-primary hover:bg-primary-hover text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center whitespace-nowrap shadow-sm">
                            <i class="ph ph-plus mr-2"></i> Tambah Kriteria
                        </button>
                    </div>
                    
                    <div class="p-4 sm:p-6 bg-gray-50/50 dark:bg-gray-800/50 border-b border-gray-100 dark:border-gray-700">
                        <div class="flex items-center justify-between">
                            <span class="text-sm font-medium">Status Bobot:</span>
                            <span id="weight-status" class="px-3 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400">Total: 100 (Valid)</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2 mt-2 dark:bg-gray-700">
                            <div id="weight-progress" class="bg-success h-2 rounded-full transition-all duration-500" style="width: 100%"></div>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 dark:bg-gray-900/50 text-gray-600 dark:text-gray-300 text-sm uppercase tracking-wider">
                                    <th class="p-4 border-b dark:border-gray-700 font-semibold w-16">No</th>
                                    <th class="p-4 border-b dark:border-gray-700 font-semibold">Kode</th>
                                    <th class="p-4 border-b dark:border-gray-700 font-semibold">Nama Kriteria</th>
                                    <th class="p-4 border-b dark:border-gray-700 font-semibold">Sifat</th>
                                    <th class="p-4 border-b dark:border-gray-700 font-semibold text-center w-24">Bobot</th>
                                    <th class="p-4 border-b dark:border-gray-700 font-semibold text-center w-28">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="criteria-table-body" class="divide-y divide-gray-100 dark:divide-gray-700 text-sm">
                                <!-- Data will be injected here via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-criteria" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-xl w-full max-w-md modal-content border border-gray-200 dark:border-gray-700 overflow-hidden">
            <div class="p-5 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-gray-50/50 dark:bg-gray-800/50">
                <h3 class="text-lg font-semibold" id="modal-criteria-title">Tambah Kriteria</h3>
                <button onclick="closeModal('modal-criteria')" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 focus:outline-none">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>
            <form id="form-criteria" class="p-5 space-y-4">
                <input type="hidden" id="crit-id">
                <div>
                    <label class="block text-sm font-medium mb-1">Kode Kriteria</label>
                    <input type="text" id="crit-code" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm" placeholder="Contoh: C1">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Nama Kriteria</label>
                    <input type="text" id="crit-name" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm" placeholder="Contoh: Harga">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Sifat (Tipe)</label>
                    <select id="crit-type" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm">
                        <option value="cost">Cost (Semakin kecil semakin baik)</option>
                        <option value="benefit">Benefit (Semakin besar semakin baik)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Bobot (Total semua harus 100)</label>
                    <input type="number" id="crit-weight" required min="1" max="100" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm" placeholder="Contoh: 20">
                </div>
                <div class="pt-4 flex justify-end space-x-3">
                    <button type="button" onclick="closeModal('modal-criteria')" class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg transition-colors">Batal</button>
                    <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-primary hover:bg-primary-hover rounded-lg transition-colors shadow-sm">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="assets/js/store.js"></script>
    <script src="assets/js/criteria.js"></script>
    <script src="assets/js/alternatives.js"></script>
    <script src="assets/js/saw.js"></script>
    <script src="assets/js/export.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
